<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SQL Optimization Agent UI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --accent: #3b82f6;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --amber-bg: #f59e0b;
      --amber-text: #111827;
      --ok: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --header-h: 72px;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, system-ui, -apple-system, sans-serif;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      background: #111827;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      z-index: 100;
    }

    .title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #dbeafe;
    }

    .level-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 999px;
      min-width: 260px;
    }

    .level-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--ok);
      flex: 0 0 auto;
    }

    .level-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 100%;
    }

    .level-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .tiny-progress {
      width: 100%;
      height: 5px;
      border-radius: 999px;
      background: #0b1220;
      overflow: hidden;
    }

    .tiny-progress > span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .stats {
      justify-self: end;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat-badge {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
    }

    .app {
      margin-top: var(--header-h);
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      min-height: calc(100vh - var(--header-h));
    }

    .primary {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .top-panels {
      display: grid;
      grid-template-columns: 60% 40%;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      min-width: 0;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      border-radius: 999px;
      border: 1px solid #1d4ed8;
      color: #bfdbfe;
      background: #1e3a8a;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .goal-box {
      background: var(--amber-bg);
      color: var(--amber-text);
      border-radius: 10px;
      padding: 10px;
      font-size: 0.92rem;
      line-height: 1.4;
      margin-bottom: 12px;
      font-weight: 600;
    }

    pre[class*="language-"] {
      margin: 0;
      border-radius: 10px;
      border: 1px solid #0b1220;
      max-height: 240px;
      overflow: auto;
      background: #0b1220 !important;
    }

    details {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #172133;
    }

    summary {
      cursor: pointer;
      padding: 10px;
      font-weight: 600;
      user-select: none;
    }

    .plan-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86rem;
    }

    .plan-table th,
    .plan-table td {
      border-top: 1px solid var(--border);
      padding: 8px;
      text-align: left;
    }

    select,
    textarea,
    button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      font: inherit;
    }

    select,
    textarea {
      background: #0b1220;
      color: var(--text);
      padding: 10px;
    }

    textarea {
      resize: vertical;
      min-height: 200px;
    }

    .small-textarea {
      min-height: 100px;
    }

    .code-editor {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #0b1220;
    }

    .code-editor pre {
      max-height: none;
      min-height: 200px;
      margin: 0;
      border: none;
      padding: 12px;
      pointer-events: none;
      overflow: hidden;
    }

    .code-editor textarea {
      position: absolute;
      inset: 0;
      min-height: 200px;
      border: none;
      background: transparent;
      color: transparent;
      caret-color: #ffffff;
      padding: 12px;
      line-height: 1.5;
      font-family: Consolas, Monaco, monospace;
      white-space: pre;
      overflow: auto;
    }

    button {
      background: var(--accent);
      color: #ffffff;
      padding: 11px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #ffffff;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .reward-card {
      display: none;
    }

    .reward-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .score-big {
      font-size: 2rem;
      font-weight: 800;
    }

    .status-badge {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .bar-row {
      margin: 10px 0;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.84rem;
      color: #cbd5e1;
      margin-bottom: 4px;
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: #0b1220;
      overflow: hidden;
    }

    .bar-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      transition: width 1s ease;
    }

    .history-list {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - var(--header-h) - 40px);
      overflow: auto;
    }

    .history-card {
      background: #172133;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 0.82rem;
    }

    .muted {
      color: var(--muted);
    }

    .note {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #cbd5e1;
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
      }

      .top-panels {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="title">SQL Optimization Curriculum</div>
    <div class="level-pill">
      <span class="level-dot" id="levelDot"></span>
      <div class="level-wrap">
        <div class="level-row">
          <strong id="levelText">Level 1</strong>
          <span class="muted" id="streakText">0/3 to Level 2</span>
        </div>
        <div class="tiny-progress"><span id="streakProgress"></span></div>
      </div>
    </div>
    <div class="stats">
      <span class="stat-badge" id="episodeCounter">Episode: 0</span>
      <span class="stat-badge" id="streakCounter">Streak: 0</span>
    </div>
  </header>

  <main class="app">
    <section class="primary">
      <div class="top-panels">
        <article class="panel">
          <div class="row">
            <h2 id="taskTitle">task_id</h2>
            <span class="badge" id="difficultyBadge">EASY</span>
          </div>

          <div class="goal-box" id="goalText">Goal text appears here.</div>

          <h2>Current Query</h2>
          <pre><code class="language-sql" id="currentQueryCode"></code></pre>

          <details>
            <summary>EXPLAIN Plan</summary>
            <div style="padding: 0 10px 10px;">
              <table class="plan-table">
                <thead>
                  <tr>
                    <th>Operation</th>
                    <th>Rows Examined</th>
                    <th>Cost</th>
                  </tr>
                </thead>
                <tbody id="planTableBody">
                  <tr><td colspan="3" class="muted">No execution plan yet.</td></tr>
                </tbody>
              </table>
            </div>
          </details>
        </article>

        <article class="panel">
          <h2>Agent Action Panel</h2>

          <label for="taskSelect" class="muted">Task</label>
          <select id="taskSelect"></select>

          <div style="height: 10px;"></div>

          <label for="patternSelect" class="muted">Anti-pattern</label>
          <select id="patternSelect">
            <option value="MISSING_INDEX">🧱 MISSING_INDEX</option>
            <option value="N_PLUS_ONE">🔁 N_PLUS_ONE</option>
            <option value="CARTESIAN_PRODUCT">🕸️ CARTESIAN_PRODUCT</option>
            <option value="LEADING_WILDCARD">🔎 LEADING_WILDCARD</option>
            <option value="SELECT_STAR">⭐ SELECT_STAR</option>
            <option value="IMPLICIT_CAST">🔄 IMPLICIT_CAST</option>
            <option value="UNBOUNDED_AGGREGATION">📈 UNBOUNDED_AGGREGATION</option>
          </select>

          <div style="height: 10px;"></div>
          <label class="muted">Optimized Query</label>
          <div class="code-editor">
            <pre><code class="language-sql" id="optimizedQueryHighlight"></code></pre>
            <textarea id="optimizedQueryInput" spellcheck="false"></textarea>
          </div>

          <details style="margin-top: 10px;">
            <summary>CREATE INDEX (optional)</summary>
            <div style="padding: 0 10px 10px;">
              <textarea id="indexStatements" class="small-textarea" placeholder="CREATE INDEX idx_name ON table(column);"></textarea>
            </div>
          </details>

          <div style="height: 12px;"></div>
          <button id="submitBtn" type="button">Submit Optimization</button>
          <button id="nextTaskBtn" type="button" style="margin-top:8px; display:none; background:#16a34a;">Load Next Task</button>
          <div class="note" id="feedbackNote"></div>
        </article>
      </div>

      <article class="panel reward-card" id="rewardCard">
        <div class="reward-header">
          <h2 style="margin:0;">Reward Breakdown</h2>
          <span class="status-badge" id="passFailBadge">FAIL</span>
        </div>
        <div class="row" style="margin-bottom:6px;">
          <div class="score-big" id="totalScore">0.00</div>
          <div class="muted" id="speedupText">1.0x faster</div>
        </div>
        <div id="barsWrap"></div>
        <div id="penaltyRow" class="note"></div>
      </article>
    </section>

    <aside class="panel">
      <h2>Episode History</h2>
      <div id="historyList" class="history-list"></div>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
  <script>
    const stateStore = {
      tasks: [],
      currentTask: null,
      episodes: 0,
      streak: 0,
      history: []
    };

    const levelColors = {
      1: "#22c55e",
      2: "#3b82f6",
      3: "#eab308",
      4: "#f97316",
      5: "#ef4444"
    };

    const scoreBarConfig = [
      { key: "speedup", label: "Speedup", weight: 35 },
      { key: "equivalence", label: "Equivalence", weight: 25 },
      { key: "pattern", label: "Pattern", weight: 20 },
      { key: "index", label: "Index", weight: 10 },
      { key: "simplicity", label: "Simplicity", weight: 10 }
    ];

    const ui = {
      taskSelect: document.getElementById("taskSelect"),
      taskTitle: document.getElementById("taskTitle"),
      difficultyBadge: document.getElementById("difficultyBadge"),
      goalText: document.getElementById("goalText"),
      currentQueryCode: document.getElementById("currentQueryCode"),
      planTableBody: document.getElementById("planTableBody"),
      optimizedQueryInput: document.getElementById("optimizedQueryInput"),
      optimizedQueryHighlight: document.getElementById("optimizedQueryHighlight"),
      patternSelect: document.getElementById("patternSelect"),
      indexStatements: document.getElementById("indexStatements"),
      submitBtn: document.getElementById("submitBtn"),
      nextTaskBtn: document.getElementById("nextTaskBtn"),
      feedbackNote: document.getElementById("feedbackNote"),
      episodeCounter: document.getElementById("episodeCounter"),
      streakCounter: document.getElementById("streakCounter"),
      levelText: document.getElementById("levelText"),
      levelDot: document.getElementById("levelDot"),
      streakText: document.getElementById("streakText"),
      streakProgress: document.getElementById("streakProgress"),
      rewardCard: document.getElementById("rewardCard"),
      barsWrap: document.getElementById("barsWrap"),
      totalScore: document.getElementById("totalScore"),
      speedupText: document.getElementById("speedupText"),
      penaltyRow: document.getElementById("penaltyRow"),
      passFailBadge: document.getElementById("passFailBadge"),
      historyList: document.getElementById("historyList")
    };

    function clamp01(value) {
      if (!Number.isFinite(value)) return 0;
      return Math.max(0, Math.min(1, value));
    }

    function parseTaskList(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload.tasks)) return payload.tasks;
      if (Array.isArray(payload.data)) return payload.data;
      return [];
    }

    function inferLevel(state) {
      return state.level || state.curriculum_level || state.current_level || 1;
    }

    function inferStreak(state) {
      return state.streak || state.current_streak || state.win_streak || 0;
    }

    function inferTarget(state, level) {
      return state.streak_target || state.level_up_streak || 3;
    }

    function renderCurriculum(state = {}) {
      const level = Math.max(1, Math.min(5, Number(inferLevel(state)) || 1));
      const streak = Number(inferStreak(state)) || 0;
      const target = Math.max(1, Number(inferTarget(state, level)) || 3);
      const next = Math.min(5, level + 1);

      ui.levelText.textContent = "Level " + level;
      ui.levelDot.style.background = levelColors[level] || levelColors[1];
      ui.streakText.textContent = streak + "/" + target + " to Level " + next;
      ui.streakProgress.style.width = (Math.min(streak, target) / target) * 100 + "%";
      ui.streakCounter.textContent = "Streak: " + streak;
      stateStore.streak = streak;
    }

    function renderCounters() {
      ui.episodeCounter.textContent = "Episode: " + stateStore.episodes;
      ui.streakCounter.textContent = "Streak: " + stateStore.streak;
    }

    function renderHistory() {
      ui.historyList.innerHTML = "";
      const slice = stateStore.history.slice(0, 10);
      if (!slice.length) {
        const empty = document.createElement("div");
        empty.className = "history-card muted";
        empty.textContent = "No episodes submitted yet.";
        ui.historyList.appendChild(empty);
        return;
      }

      slice.forEach(function(item) {
        const card = document.createElement("div");
        card.className = "history-card";
        const color = item.total >= 0.7 ? "#22c55e" : (item.total >= 0.4 ? "#f59e0b" : "#ef4444");
        card.innerHTML =
          "<div><strong>" + item.task + "</strong></div>" +
          "<div class='muted'>Pattern: " + item.pattern + "</div>" +
          "<div>Score: <strong style='color:" + color + ";'>" + item.total.toFixed(2) + "</strong> | " + item.speedup.toFixed(1) + "x</div>" +
          "<div class='muted'>" + new Date(item.ts).toLocaleTimeString() + "</div>";
        ui.historyList.appendChild(card);
      });
    }

    function renderTask(task) {
      stateStore.currentTask = task || {};
      ui.taskTitle.textContent = task.task_id || task.id || "task_id";
      ui.difficultyBadge.textContent = (task.difficulty || "EASY").toUpperCase();
      ui.goalText.textContent = task.goal || task.description || "No goal available.";

      const currentQuery = task.current_query || task.query || "";
      ui.currentQueryCode.textContent = currentQuery;
      Prism.highlightElement(ui.currentQueryCode);

      ui.optimizedQueryInput.value = currentQuery;
      syncEditorHighlight();

      const plan = task.execution_plan || task.explain_plan || [];
      renderPlan(plan);
    }

    function renderPlan(plan) {
      ui.planTableBody.innerHTML = "";
      const rows = Array.isArray(plan) ? plan : [];
      if (!rows.length) {
        const tr = document.createElement("tr");
        tr.innerHTML = "<td colspan='3' class='muted'>No execution plan data.</td>";
        ui.planTableBody.appendChild(tr);
        return;
      }
      rows.forEach(function(row) {
        const tr = document.createElement("tr");
        const op = row.operation || row.node || row.type || "-";
        const examined = row.rows_examined || row.rows || row.cardinality || "-";
        const cost = row.cost || row.total_cost || row.estimated_cost || "-";
        tr.innerHTML = "<td>" + op + "</td><td>" + examined + "</td><td>" + cost + "</td>";
        ui.planTableBody.appendChild(tr);
      });
    }

    function syncEditorHighlight() {
      ui.optimizedQueryHighlight.textContent = ui.optimizedQueryInput.value;
      Prism.highlightElement(ui.optimizedQueryHighlight);
      ui.optimizedQueryHighlight.parentElement.scrollTop = ui.optimizedQueryInput.scrollTop;
      ui.optimizedQueryHighlight.parentElement.scrollLeft = ui.optimizedQueryInput.scrollLeft;
    }

    function setSubmitLoading(isLoading) {
      ui.submitBtn.disabled = isLoading;
      ui.submitBtn.innerHTML = isLoading ? "Submitting<span class='spinner'></span>" : "Submit Optimization";
    }

    function parseIndexStatements(raw) {
      return raw
        .split(";")
        .map(function(s) { return s.trim(); })
        .filter(Boolean)
        .map(function(s) { return s + ";"; });
    }

    function normalizeScores(response) {
      const parts = response.score_breakdown || response.breakdown || response.components || {};
      return {
        speedup: clamp01(Number(parts.speedup_score ?? parts.speedup ?? 0)),
        equivalence: clamp01(Number(parts.equivalence_score ?? parts.equivalence ?? 0)),
        pattern: clamp01(Number(parts.pattern_score ?? parts.pattern ?? 0)),
        index: clamp01(Number(parts.index_score ?? parts.index ?? 0)),
        simplicity: clamp01(Number(parts.simplicity_score ?? parts.simplicity ?? 0))
      };
    }

    function showReward(response) {
      const scores = normalizeScores(response);
      const total = Number(response.total_reward ?? response.total_score ?? response.reward ?? 0);
      const speedupRatio = Number(response.speedup_ratio ?? response.speedup ?? 1);
      const penalties = Number(response.penalties ?? response.penalty ?? 0);
      const pass = Boolean(response.passed ?? response.pass ?? total >= 0.7);

      ui.rewardCard.style.display = "block";
      ui.barsWrap.innerHTML = "";

      scoreBarConfig.forEach(function(item, idx) {
        const pct = Math.round(scores[item.key] * 100);
        const row = document.createElement("div");
        row.className = "bar-row";
        row.innerHTML =
          "<div class='bar-label'><span>" + item.label + " " + item.weight + "%</span><span>" + pct + "%</span></div>" +
          "<div class='bar-track'><div class='bar-fill' id='bar-" + item.key + "'></div></div>";
        ui.barsWrap.appendChild(row);

        window.setTimeout(function() {
          const fill = document.getElementById("bar-" + item.key);
          if (fill) fill.style.width = pct + "%";
        }, idx * 150);
      });

      ui.totalScore.textContent = total.toFixed(2);
      ui.speedupText.textContent = speedupRatio.toFixed(1) + "x faster";

      let color = "#ef4444";
      if (total >= 0.7) color = "#22c55e";
      else if (total >= 0.4) color = "#f59e0b";
      ui.totalScore.style.color = color;

      ui.passFailBadge.textContent = pass ? "PASS" : "FAIL";
      ui.passFailBadge.style.background = pass ? "rgba(34,197,94,0.2)" : "rgba(239,68,68,0.2)";
      ui.passFailBadge.style.color = pass ? "#86efac" : "#fca5a5";
      ui.passFailBadge.style.border = "1px solid " + (pass ? "#16a34a" : "#dc2626");

      ui.penaltyRow.textContent = penalties > 0 ? ("Penalty applied: -" + penalties.toFixed(2)) : "";
    }

    async function fetchJson(url, options) {
      const res = await fetch(url, options);
      if (!res.ok) {
        throw new Error("Request failed: " + res.status + " " + res.statusText);
      }
      return res.json();
    }

    async function loadStateAndRender() {
      const state = await fetchJson("/state");
      renderCurriculum(state);
      return state;
    }

    async function loadTasks() {
      const payload = await fetchJson("/tasks");
      stateStore.tasks = parseTaskList(payload);

      ui.taskSelect.innerHTML = "";
      stateStore.tasks.forEach(function(task) {
        const id = task.task_id || task.id;
        if (!id) return;
        const opt = document.createElement("option");
        opt.value = id;
        opt.textContent = id;
        ui.taskSelect.appendChild(opt);
      });
    }

    async function resetToTask(taskId) {
      const target = taskId ? ("/reset?task_id=" + encodeURIComponent(taskId)) : "/reset";
      const task = await fetchJson(target, { method: "POST" });
      renderTask(task);
      ui.feedbackNote.textContent = "";
      ui.nextTaskBtn.style.display = "none";
      return task;
    }

    async function initialize() {
      try {
        await Promise.all([loadTasks(), loadStateAndRender()]);
        const firstTaskId = ui.taskSelect.value || (stateStore.tasks[0] && (stateStore.tasks[0].task_id || stateStore.tasks[0].id));
        await resetToTask(firstTaskId);
        renderHistory();
        renderCounters();
      } catch (err) {
        ui.feedbackNote.textContent = err.message;
      }
    }

    async function submitStep() {
      try {
        setSubmitLoading(true);
        ui.feedbackNote.textContent = "";

        const payload = {
          optimized_query: ui.optimizedQueryInput.value,
          identified_pattern: ui.patternSelect.value,
          explanation: "Manual",
          index_statements: parseIndexStatements(ui.indexStatements.value)
        };

        const result = await fetchJson("/step", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        stateStore.episodes += 1;
        showReward(result);

        const total = Number(result.total_reward ?? result.total_score ?? result.reward ?? 0);
        const speed = Number(result.speedup_ratio ?? result.speedup ?? 1);
        stateStore.history.unshift({
          task: stateStore.currentTask?.task_id || "unknown_task",
          pattern: ui.patternSelect.value,
          total: total,
          speedup: speed,
          ts: Date.now()
        });
        stateStore.history = stateStore.history.slice(0, 10);
        renderHistory();

        if (result.done === true) {
          await loadStateAndRender();
          ui.nextTaskBtn.style.display = "block";
          ui.feedbackNote.textContent = "Episode complete. Ready for next task.";
        } else {
          ui.feedbackNote.textContent = "Step submitted. Keep iterating.";
        }
      } catch (err) {
        ui.feedbackNote.textContent = err.message;
      } finally {
        renderCounters();
        setSubmitLoading(false);
      }
    }

    ui.optimizedQueryInput.addEventListener("input", syncEditorHighlight);
    ui.optimizedQueryInput.addEventListener("scroll", syncEditorHighlight);
    ui.taskSelect.addEventListener("change", function() {
      resetToTask(ui.taskSelect.value).catch(function(err) {
        ui.feedbackNote.textContent = err.message;
      });
    });
    ui.submitBtn.addEventListener("click", submitStep);
    ui.nextTaskBtn.addEventListener("click", function() {
      resetToTask(ui.taskSelect.value).catch(function(err) {
        ui.feedbackNote.textContent = err.message;
      });
    });

    initialize();
  </script>
</body>
</html>
