<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SQL Optimization RL Environment</title>

<style>
:root {
  --bg:#0f172a; --panel:#1e293b; --accent:#3b82f6;
  --text:#e2e8f0; --muted:#94a3b8;
}
body {
  font-family: system-ui;
  background: var(--bg);
  color: var(--text);
  padding: 2rem;
}
h1 { color: var(--accent); }
.card {
  background: var(--panel);
  padding: 1rem;
  border-radius: 10px;
  margin-top: 1rem;
}
button {
  background: var(--accent);
  color: white;
  padding: 0.6rem 1rem;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}
textarea {
  width: 100%;
  height: 120px;
  background: #020617;
  color: white;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #334155;
}
pre {
  background:#020617;
  padding:10px;
  border-radius:6px;
  overflow-x:auto;
}
.badge {
  background:#1d4ed8;
  padding:2px 8px;
  border-radius:5px;
  font-size:12px;
}
</style>
</head>

<body>

<h1>🚀 SQL Optimization Agent UI</h1>

<div class="card">
  <h3>📌 Select Task</h3>
  <select id="taskSelect"></select>
  <button onclick="loadTask()">Load Task</button>
</div>

<div class="card">
  <h3>🎯 Goal</h3>
  <p id="goal"></p>
</div>

<div class="card">
  <h3>🐢 Current Query</h3>
  <pre id="currentQuery"></pre>
</div>

<div class="card">
  <h3>⚡ Optimized Query</h3>
  <textarea id="optimizedQuery"></textarea>

  <br><br>

  <label>Pattern:</label>
  <select id="pattern">
    <option>SELECT_STAR</option>
    <option>MISSING_INDEX</option>
    <option>N_PLUS_ONE</option>
    <option>CARTESIAN_PRODUCT</option>
    <option>LEADING_WILDCARD</option>
    <option>IMPLICIT_CAST</option>
    <option>UNBOUNDED_AGGREGATION</option>
  </select>

  <br><br>

  <button onclick="runStep()">🚀 Run Optimization</button>
</div>

<div class="card">
  <h3>📊 Result</h3>
  <pre id="result"></pre>
</div>

<script>
const BASE = "";

let currentTask = null;

// Load tasks into dropdown
async function loadTasks() {
  const res = await fetch(BASE + "/tasks");
  const data = await res.json();
  const select = document.getElementById("taskSelect");

  data.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t.task_id;
    opt.textContent = `${t.task_id} (L${t.curriculum_level})`;
    select.appendChild(opt);
  });
}

// Load selected task
async function loadTask() {
  const taskId = document.getElementById("taskSelect").value;

  const res = await fetch(BASE + "/reset?task_id=" + taskId);
  const data = await res.json();

  currentTask = data;

  document.getElementById("goal").textContent = data.goal;
  document.getElementById("currentQuery").textContent = data.current_query;
  document.getElementById("optimizedQuery").value = data.current_query;
}

// Run optimization step
async function runStep() {
  const query = document.getElementById("optimizedQuery").value;
  const pattern = document.getElementById("pattern").value;

  const res = await fetch(BASE + "/step", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      optimized_query: query,
      identified_pattern: pattern,
      explanation: "Manual optimization",
      index_statements: []
    })
  });

  const data = await res.json();

  document.getElementById("result").textContent =
    JSON.stringify(data, null, 2);
}

loadTasks();
</script>

</body>
</html>
